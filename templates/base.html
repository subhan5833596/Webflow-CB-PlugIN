<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}CB Tracker{% endblock %}</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='styles.css') }}"
    />
  </head>
  <body>
    <div class="loader-overlay" id="loader">
      <div class="loader-ring"></div>
      <div class="loader-label" id="loader-label">Loading</div>
    </div>

    <div class="toast-stack" id="toast-stack"></div>

    <aside class="sidebar">
      <div class="sidebar-top">
        <a href="/" class="sidebar-brand">
          <div class="brand-mark">
            <svg
              width="14"
              height="14"
              viewBox="0 0 14 14"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <circle cx="7" cy="7" r="3" fill="white" />
              <circle
                cx="7"
                cy="7"
                r="6"
                stroke="white"
                stroke-width="1.5"
                fill="none"
              />
            </svg>
          </div>
          <span class="brand-name">CB Tracker</span>
        </a>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-group">
          <span class="nav-group-label">General</span>
          <!-- <a href="/" class="nav-link {% if active=='home' %}active{% endif %}">
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M7.5 1.5L1.5 7h2v6h3v-4h2v4h3V7h2L7.5 1.5z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round" fill="none"/></svg>
        Dashboard
      </a> -->
          <a
            href="/setup_page"
            class="nav-link {% if active=='setup' %}active{% endif %}"
          >
            <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
              <circle
                cx="7.5"
                cy="7.5"
                r="6"
                stroke="currentColor"
                stroke-width="1.3"
                fill="none"
              />
              <path
                d="M5 7.5h5M7.5 5v5"
                stroke="currentColor"
                stroke-width="1.3"
                stroke-linecap="round"
              />
            </svg>
            Setup Site
          </a>
        </div>

        <div class="nav-group">
          <span class="nav-group-label">Tracking</span>
          <a
            href="/tracking_rule"
            class="nav-link {% if active=='trigger' %}active{% endif %}"
          >
            <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
              <path
                d="M8 1.5L3 8.5h4l-1 5 5-7H7L8 1.5z"
                stroke="currentColor"
                stroke-width="1.3"
                stroke-linejoin="round"
                fill="none"
              />
            </svg>
            Trigger Variables
          </a>
          <a
            href="/variables"
            class="nav-link {% if active=='variables' %}active{% endif %}"
          >
            <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
              <rect
                x="2"
                y="2"
                width="11"
                height="3"
                rx="1"
                stroke="currentColor"
                stroke-width="1.3"
                fill="none"
              />
              <rect
                x="2"
                y="7"
                width="11"
                height="3"
                rx="1"
                stroke="currentColor"
                stroke-width="1.3"
                fill="none"
              />
              <rect
                x="2"
                y="12"
                width="6"
                height="1.5"
                rx=".75"
                fill="currentColor"
              />
            </svg>
            View Variables
          </a>
          <!-- <a
            href="/tracking_history"
            class="nav-link {% if active=='history' %}active{% endif %}"
          >
            <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
              <path
                d="M2 13V4.5L7.5 2 13 4.5V13H2z"
                stroke="currentColor"
                stroke-width="1.3"
                fill="none"
              />
              <path
                d="M5 8h5M5 10.5h3"
                stroke="currentColor"
                stroke-width="1.3"
                stroke-linecap="round"
              />
            </svg>
            Event History
          </a> -->
        </div>

        <!-- <div class="nav-group">
          <span class="nav-group-label">Developer</span>
          <a
            href="/testing"
            class="nav-link {% if active=='testing' %}active{% endif %}"
          >
            <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
              <path
                d="M4.5 3L2 7.5 4.5 12M10.5 3L13 7.5 10.5 12M8.5 2l-2 11"
                stroke="currentColor"
                stroke-width="1.3"
                stroke-linecap="round"
              />
            </svg>
            Test Page
          </a>
        </div> -->
      </nav>
    </aside>

    <main class="main">{% block content %}{% endblock %}</main>

    <script>
      function showLoader(text) {
        document.getElementById("loader-label").textContent = text || "Loading";
        document.getElementById("loader").classList.add("active");
      }
      function hideLoader() {
        document.getElementById("loader").classList.remove("active");
      }

      function toast(msg, type) {
        type = type || "info";
        const el = document.createElement("div");
        el.className = "toast " + type;
        el.innerHTML =
          '<div class="toast-bar"></div><div class="toast-text">' +
          msg +
          "</div>";
        document.getElementById("toast-stack").appendChild(el);
        setTimeout(function () {
          el.remove();
        }, 4000);
      }

      var Store = {
        get: function (k) {
          try {
            return JSON.parse(localStorage.getItem("cb_" + k));
          } catch (e) {
            return null;
          }
        },
        set: function (k, v) {
          localStorage.setItem("cb_" + k, JSON.stringify(v));
        },
        del: function (k) {
          localStorage.removeItem("cb_" + k);
        },
      };
    </script>

    {% block scripts %}{% endblock %}
  </body>
</html>
